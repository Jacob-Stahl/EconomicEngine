<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EELib WASM Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .controls { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: end; }
        .control-group { display: flex; flex-direction: column; gap: 0.35rem; }
        .control-group label { font-size: 0.9rem; color: #333; }
        .control-group input { width: 8rem; padding: 0.45rem 0.55rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
        .control-note { flex-basis: 100%; font-size: 0.9rem; color: #666; margin: 0; }
        button { padding: 0.6rem 1rem; border: 1px solid #ccc; background: #f7f7f7; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #spreadChart, #depthChart { border: 1px solid #ccc; margin-bottom: 1rem; background: #fff; width: 100%; max-width: 960px; height: 320px; }
        .chart-meta { margin: 0.5rem 0 1rem; font-family: monospace; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <label for="hungerDelayMeanInput">Consumer Hunger Delay Mean</label>
            <input id="hungerDelayMeanInput" type="number" min="0" step="1" value="0">
        </div>
        <div class="control-group">
            <label for="hungerDelayStdInput">Consumer Hunger Delay Std Dev</label>
            <input id="hungerDelayStdInput" type="number" min="0" step="1" value="0">
        </div>
        <div class="control-group">
            <label for="maxPriceInput">Consumer Max Price</label>
            <input id="maxPriceInput" type="number" min="0" step="1" value="100">
        </div>
        <div class="control-group">
            <label for="numConsumersInput">Number of Consumers</label>
            <input id="numConsumersInput" type="number" min="1" step="1" value="1000">
        </div>
        <div class="control-group">
            <label for="producerPriceInput">Producer Preferred Price</label>
            <input id="producerPriceInput" type="number" min="0" step="1" value="50">
        </div>
        <button id="restartButton" disabled>Restart Simulation</button>
        <p class="control-note">Parameter changes apply to the active simulation. Use restart only to reset the run.</p>
    </div>

    <canvas id="spreadChart" width="960" height="320"></canvas>
    <div id="chartMeta" class="chart-meta">Tracking latest 25 ticks.</div>

    <canvas id="depthChart" width="960" height="320"></canvas>
    <div id="depthMeta" class="chart-meta">Waiting for first depth snapshot.</div>

    <script src="eelib.js"></script>
    <script type="module">
        import { createDepthChart, createSpreadChart } from './charts.js';

        const restartButton = document.getElementById('restartButton');
        const hungerDelayMeanInput = document.getElementById('hungerDelayMeanInput');
        const hungerDelayStdInput = document.getElementById('hungerDelayStdInput');
        const maxPriceInput = document.getElementById('maxPriceInput');
        const numConsumersInput = document.getElementById('numConsumersInput');
        const producerPriceInput = document.getElementById('producerPriceInput');
        const spreadChart = createSpreadChart({
            canvas: document.getElementById('spreadChart'),
            metaElement: document.getElementById('chartMeta'),
            historyWindow: 500,
        });
        const depthChart = createDepthChart({
            canvas: document.getElementById('depthChart'),
            metaElement: document.getElementById('depthMeta'),
        });
        const maxSteps = Infinity;
        const defaultParams = {
            hungerDelayMean: 0,
            hungerDelayStd: 0,
            maxPrice: 100,
            numConsumers: 1000,
            producerPrice: 50,
        };

        let moduleInstance = null;
        let activeSimulation = null;
        let step = 0;
        let timerId = null;

        function resetCharts() {
            spreadChart.reset();
            depthChart.reset();
        }

        function stopSimulation() {
            if (timerId !== null) {
                clearTimeout(timerId);
                timerId = null;
            }
        }

        function destroySimulation(simulation) {
            if (!simulation) {
                return;
            }

            simulation.consumerManager.delete();
            simulation.producerManager.delete();
            simulation.abm.delete();
        }

        function getInputValue(input, fallback, minValue) {
            const parsed = Number.parseInt(input.value, 10);

            if (Number.isNaN(parsed)) {
                input.value = fallback;
                return fallback;
            }

            const sanitized = Math.max(minValue, parsed);
            if (sanitized !== parsed) {
                input.value = sanitized;
            }

            return sanitized;
        }

        function getSimulationParams() {
            return {
                hungerDelayMean: getInputValue(hungerDelayMeanInput, defaultParams.hungerDelayMean, 0),
                hungerDelayStd: getInputValue(hungerDelayStdInput, defaultParams.hungerDelayStd, 0),
                maxPrice: getInputValue(maxPriceInput, defaultParams.maxPrice, 0),
                numConsumers: getInputValue(numConsumersInput, defaultParams.numConsumers, 1),
                producerPrice: getInputValue(producerPriceInput, defaultParams.producerPrice, 0),
            };
        }

        function createSimulation(Module, params) {
            const abm = new Module.ABM();
            const consumerManager = Module.createConsumerManager(abm, "consumers", "FOOD");
            const producerManager = Module.createProducerManager(abm, "producer", "FOOD");

            const simulation = {
                abm,
                consumerManager,
                producerManager,
            };

            applyParamsToSimulation(simulation, params);

            return simulation;
        }

        function applyParamsToSimulation(simulation, params) {
            if (!simulation) {
                return;
            }

            simulation.consumerManager.changeHungerDelay(params.hungerDelayMean, params.hungerDelayStd);
            simulation.consumerManager.changeMaxPrice(params.maxPrice, 0);
            simulation.consumerManager.changeNumAgents(params.numConsumers);

            simulation.producerManager.changePreferedPrice(params.producerPrice, 0);
            simulation.producerManager.changeNumAgents(1);
        }

        function runStep() {
            if (!activeSimulation || step >= maxSteps) {
                timerId = null;
                return;
            }

            activeSimulation.abm.simStep();
            step++;

            const obs = activeSimulation.abm.getLatestObservation();
            const time = obs.time.raw();
            const spread = obs.assetSpreads.get("FOOD");
            const depth = obs.assetOrderDepths.get("FOOD");

            spreadChart.pushPoint(time, spread);
            spreadChart.render();
            depthChart.render({ depth, spread, time });

            timerId = setTimeout(runStep, 1);
        }

        function startSimulation() {
            if (!moduleInstance) {
                return;
            }

            stopSimulation();
            step = 0;
            resetCharts();

            destroySimulation(activeSimulation);
            activeSimulation = createSimulation(moduleInstance, getSimulationParams());
            runStep();
        }

        restartButton.addEventListener('click', () => {
            startSimulation();
        });

        [
            hungerDelayMeanInput,
            hungerDelayStdInput,
            maxPriceInput,
            numConsumersInput,
            producerPriceInput,
        ].forEach(input => {
            input.addEventListener('change', () => {
                if (!activeSimulation) {
                    return;
                }

                applyParamsToSimulation(activeSimulation, getSimulationParams());
            });
        });

        window.createEelib().then(Module => {
            try {
                moduleInstance = Module;
                restartButton.disabled = false;
                resetCharts();
                startSimulation();

            } catch (e) {
                console.error(e);
            }
        }).catch(err => {
            console.error(err);
        });
    </script>
</body>
</html>
