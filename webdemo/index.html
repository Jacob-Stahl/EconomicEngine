<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EELib WASM Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .controls { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: end; }
        .control-group { display: flex; flex-direction: column; gap: 0.35rem; }
        .control-group label { font-size: 0.9rem; color: #333; }
        .control-group input { width: 8rem; padding: 0.45rem 0.55rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
        .control-note { flex-basis: 100%; font-size: 0.9rem; color: #666; margin: 0; }
        button { padding: 0.6rem 1rem; border: 1px solid #ccc; background: #f7f7f7; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #spreadChart, #depthChart { border: 1px solid #ccc; margin-bottom: 1rem; background: #fff; width: 100%; max-width: 960px; height: 320px; }
        .chart-meta { margin: 0.5rem 0 1rem; font-family: monospace; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <label for="hungerDelayInput">Consumer Hunger Delay</label>
            <input id="hungerDelayInput" type="number" min="0" step="1" value="0">
        </div>
        <div class="control-group">
            <label for="maxPriceInput">Consumer Max Price</label>
            <input id="maxPriceInput" type="number" min="0" step="1" value="100">
        </div>
        <div class="control-group">
            <label for="numConsumersInput">Number of Consumers</label>
            <input id="numConsumersInput" type="number" min="1" step="1" value="1000">
        </div>
        <div class="control-group">
            <label for="producerPriceInput">Producer Preferred Price</label>
            <input id="producerPriceInput" type="number" min="0" step="1" value="50">
        </div>
        <button id="restartButton" disabled>Restart Simulation</button>
        <p class="control-note">Parameter changes take effect the next time you restart the simulation.</p>
    </div>

    <canvas id="spreadChart" width="960" height="320"></canvas>
    <div id="chartMeta" class="chart-meta">Tracking latest 25 ticks.</div>

    <canvas id="depthChart" width="960" height="320"></canvas>
    <div id="depthMeta" class="chart-meta">Waiting for first depth snapshot.</div>

    <script src="eelib.js"></script>
    <script>
        const spreadCanvas = document.getElementById('spreadChart');
        const spreadCtx = spreadCanvas.getContext('2d');
        const chartMeta = document.getElementById('chartMeta');
        const depthCanvas = document.getElementById('depthChart');
        const depthCtx = depthCanvas.getContext('2d');
        const depthMeta = document.getElementById('depthMeta');
        const restartButton = document.getElementById('restartButton');
        const hungerDelayInput = document.getElementById('hungerDelayInput');
        const maxPriceInput = document.getElementById('maxPriceInput');
        const numConsumersInput = document.getElementById('numConsumersInput');
        const producerPriceInput = document.getElementById('producerPriceInput');
        const spreadHistoryWindow = 500;
        const spreadHistory = [];
        const maxSteps = Infinity;
        const defaultParams = {
            hungerDelay: 0,
            maxPrice: 100,
            numConsumers: 1000,
            producerPrice: 50,
        };

        let moduleInstance = null;
        let activeAbm = null;
        let step = 0;
        let timerId = null;

        function pushSpreadPoint(time, spread) {
            spreadHistory.push({
                time,
                bid: spread && !spread.bidsMissing ? spread.highestBid : null,
                ask: spread && !spread.asksMissing ? spread.lowestAsk : null,
            });

            if (spreadHistory.length > spreadHistoryWindow) {
                spreadHistory.shift();
            }
        }

        function drawLine(ctx, points, getX, getY, color) {
            let drawing = false;
            ctx.beginPath();

            points.forEach(point => {
                const value = point.value;
                if (value === null || value === undefined) {
                    drawing = false;
                    return;
                }

                const x = getX(point.index);
                const y = getY(value);

                if (!drawing) {
                    ctx.moveTo(x, y);
                    drawing = true;
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            points.forEach(point => {
                const value = point.value;
                if (value === null || value === undefined) {
                    return;
                }

                const x = getX(point.index);
                const y = getY(value);
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            });
        }

        function drawSpreadChart() {
            const width = spreadCanvas.width;
            const height = spreadCanvas.height;
            const padding = { top: 24, right: 16, bottom: 32, left: 42 };

            spreadCtx.clearRect(0, 0, width, height);
            spreadCtx.fillStyle = '#ffffff';
            spreadCtx.fillRect(0, 0, width, height);

            if (spreadHistory.length === 0) {
                spreadCtx.fillStyle = '#666';
                spreadCtx.font = '14px monospace';
                spreadCtx.textAlign = 'center';
                spreadCtx.fillText('Waiting for ticks...', width / 2, height / 2);
                return;
            }

            const values = spreadHistory.flatMap(point => {
                const series = [];
                if (point.bid !== null) series.push(point.bid);
                if (point.ask !== null) series.push(point.ask);
                return series;
            });

            const minValue = values.length ? Math.min(...values) : 0;
            const maxValue = values.length ? Math.max(...values) : 1;
            const range = Math.max(1, maxValue - minValue);
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            const lastIndex = Math.max(1, spreadHistory.length - 1);

            const getX = index => padding.left + (chartWidth * index) / lastIndex;
            const getY = value => padding.top + chartHeight - ((value - minValue) / range) * chartHeight;

            spreadCtx.strokeStyle = '#e2e2e2';
            spreadCtx.lineWidth = 1;

            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (chartHeight * i) / 4;
                spreadCtx.beginPath();
                spreadCtx.moveTo(padding.left, y);
                spreadCtx.lineTo(width - padding.right, y);
                spreadCtx.stroke();
            }

            spreadCtx.beginPath();
            spreadCtx.moveTo(padding.left, padding.top);
            spreadCtx.lineTo(padding.left, height - padding.bottom);
            spreadCtx.lineTo(width - padding.right, height - padding.bottom);
            spreadCtx.strokeStyle = '#999';
            spreadCtx.stroke();

            const bidPoints = spreadHistory.map((point, index) => ({ index, value: point.bid }));
            const askPoints = spreadHistory.map((point, index) => ({ index, value: point.ask }));

            drawLine(spreadCtx, bidPoints, getX, getY, '#0f766e');
            drawLine(spreadCtx, askPoints, getX, getY, '#b91c1c');

            spreadCtx.fillStyle = '#333';
            spreadCtx.font = '12px monospace';
            spreadCtx.textAlign = 'left';
            spreadCtx.fillText(`${maxValue}`, 8, padding.top + 4);
            spreadCtx.fillText(`${minValue}`, 8, height - padding.bottom);

            const firstTime = spreadHistory[0].time;
            const lastTime = spreadHistory[spreadHistory.length - 1].time;
            spreadCtx.textAlign = 'left';
            spreadCtx.fillText(`t=${firstTime}`, padding.left, height - 8);
            spreadCtx.textAlign = 'right';
            spreadCtx.fillText(`t=${lastTime}`, width - padding.right, height - 8);

            spreadCtx.textAlign = 'left';
            spreadCtx.fillStyle = '#0f766e';
            spreadCtx.fillText('Bid', padding.left, 14);
            spreadCtx.fillStyle = '#b91c1c';
            spreadCtx.fillText('Ask', padding.left + 48, 14);

            const latest = spreadHistory[spreadHistory.length - 1];
            chartMeta.textContent = `Tracking latest ${spreadHistoryWindow} ticks. Latest tick ${latest.time}: bid=${latest.bid ?? 'NA'} ask=${latest.ask ?? 'NA'}`;
        }

        function getBins(vector) {
            const bins = [];

            if (!vector) {
                return bins;
            }

            for (let i = 0; i < vector.size(); i++) {
                const bin = vector.get(i);
                bins.push({ price: bin.price, qty: bin.totalQty });
            }

            return bins;
        }

        function drawDepthSeries(ctx, bins, getX, getY, color, fillColor) {
            if (bins.length === 0) {
                return;
            }

            ctx.beginPath();
            ctx.moveTo(getX(bins[0].price), getY(0));

            bins.forEach(bin => {
                ctx.lineTo(getX(bin.price), getY(bin.qty));
            });

            ctx.lineTo(getX(bins[bins.length - 1].price), getY(0));
            ctx.closePath();
            ctx.fillStyle = fillColor;
            ctx.fill();

            ctx.beginPath();
            bins.forEach((bin, index) => {
                const x = getX(bin.price);
                const y = getY(bin.qty);

                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            bins.forEach(bin => {
                ctx.beginPath();
                ctx.arc(getX(bin.price), getY(bin.qty), 3, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            });
        }

        function drawDepthChart(depth, spread, time) {
            const width = depthCanvas.width;
            const height = depthCanvas.height;
            const padding = { top: 24, right: 16, bottom: 32, left: 42 };

            depthCtx.clearRect(0, 0, width, height);
            depthCtx.fillStyle = '#ffffff';
            depthCtx.fillRect(0, 0, width, height);

            const bidBins = getBins(depth ? depth.bidBins : null).sort((a, b) => a.price - b.price);
            const askBins = getBins(depth ? depth.askBins : null).sort((a, b) => a.price - b.price);

            if (bidBins.length === 0 && askBins.length === 0) {
                depthCtx.fillStyle = '#666';
                depthCtx.font = '14px monospace';
                depthCtx.textAlign = 'center';
                depthCtx.fillText('No depth on book.', width / 2, height / 2);
                depthMeta.textContent = `Tick ${time}: no bid or ask depth.`;
                return;
            }

            const prices = bidBins.concat(askBins).map(bin => bin.price);
            const qtys = bidBins.concat(askBins).map(bin => bin.qty);
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);
            const maxQty = Math.max(1, ...qtys);
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            const priceRange = Math.max(1, maxPrice - minPrice);
            const getX = price => padding.left + ((price - minPrice) / priceRange) * chartWidth;
            const getY = qty => padding.top + chartHeight - (qty / maxQty) * chartHeight;

            depthCtx.strokeStyle = '#e2e2e2';
            depthCtx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (chartHeight * i) / 4;
                depthCtx.beginPath();
                depthCtx.moveTo(padding.left, y);
                depthCtx.lineTo(width - padding.right, y);
                depthCtx.stroke();
            }

            depthCtx.beginPath();
            depthCtx.moveTo(padding.left, padding.top);
            depthCtx.lineTo(padding.left, height - padding.bottom);
            depthCtx.lineTo(width - padding.right, height - padding.bottom);
            depthCtx.strokeStyle = '#999';
            depthCtx.stroke();

            drawDepthSeries(depthCtx, bidBins, getX, getY, '#0f766e', 'rgba(15, 118, 110, 0.16)');
            drawDepthSeries(depthCtx, askBins, getX, getY, '#b91c1c', 'rgba(185, 28, 28, 0.16)');

            depthCtx.fillStyle = '#333';
            depthCtx.font = '12px monospace';
            depthCtx.textAlign = 'left';
            depthCtx.fillText(`${maxQty}`, 8, padding.top + 4);
            depthCtx.fillText('0', 18, height - padding.bottom);
            depthCtx.fillText(`${minPrice}`, padding.left, height - 8);
            depthCtx.textAlign = 'right';
            depthCtx.fillText(`${maxPrice}`, width - padding.right, height - 8);

            depthCtx.textAlign = 'left';
            depthCtx.fillStyle = '#0f766e';
            depthCtx.fillText('Bid Depth', padding.left, 14);
            depthCtx.fillStyle = '#b91c1c';
            depthCtx.fillText('Ask Depth', padding.left + 84, 14);

            depthMeta.textContent = `Tick ${time}: ${bidBins.length} bid bins, ${askBins.length} ask bins, top bid=${spread && !spread.bidsMissing ? spread.highestBid : 'NA'}, top ask=${spread && !spread.asksMissing ? spread.lowestAsk : 'NA'}`;
        }

        function resetCharts() {
            spreadHistory.length = 0;
            chartMeta.textContent = `Tracking latest ${spreadHistoryWindow} ticks.`;
            drawSpreadChart();
            drawDepthChart(null, null, 'NA');
        }

        function stopSimulation() {
            if (timerId !== null) {
                clearTimeout(timerId);
                timerId = null;
            }
        }

        function getInputValue(input, fallback, minValue) {
            const parsed = Number.parseInt(input.value, 10);

            if (Number.isNaN(parsed)) {
                input.value = fallback;
                return fallback;
            }

            const sanitized = Math.max(minValue, parsed);
            if (sanitized !== parsed) {
                input.value = sanitized;
            }

            return sanitized;
        }

        function getSimulationParams() {
            return {
                hungerDelay: getInputValue(hungerDelayInput, defaultParams.hungerDelay, 0),
                maxPrice: getInputValue(maxPriceInput, defaultParams.maxPrice, 0),
                numConsumers: getInputValue(numConsumersInput, defaultParams.numConsumers, 1),
                producerPrice: getInputValue(producerPriceInput, defaultParams.producerPrice, 0),
            };
        }

        function createSimulation(Module, params) {
            const abm = new Module.ABM();

            const hungerDelay = new Module.tick(params.hungerDelay);
            for(let traderId = 10; traderId < (params.numConsumers + 10); traderId++){
                const consumer = new Module.Consumer(traderId, "FOOD", params.maxPrice, hungerDelay);
                abm.addAgent(consumer);
            }

            const producer = new Module.Producer(1, "FOOD", params.producerPrice);
            abm.addAgent(producer);

            return abm;
        }

        function runStep() {
            if (!activeAbm || step >= maxSteps) {
                timerId = null;
                return;
            }

            activeAbm.simStep();
            step++;

            const obs = activeAbm.getLatestObservation();
            const time = obs.time.raw();
            const spread = obs.assetSpreads.get("FOOD");
            const depth = obs.assetOrderDepths.get("FOOD");

            pushSpreadPoint(time, spread);
            drawSpreadChart();
            drawDepthChart(depth, spread, time);

            timerId = setTimeout(runStep, 1);
        }

        function startSimulation() {
            if (!moduleInstance) {
                return;
            }

            stopSimulation();
            step = 0;
            resetCharts();
            activeAbm = createSimulation(moduleInstance, getSimulationParams());
            runStep();
        }

        restartButton.addEventListener('click', () => {
            startSimulation();
        });

        createEelib().then(Module => {
            try {
                moduleInstance = Module;
                restartButton.disabled = false;
                resetCharts();
                startSimulation();

            } catch (e) {
                console.error(e);
            }
        }).catch(err => {
            console.error(err);
        });
    </script>
</body>
</html>
